model:
  name: respire_transfuse
  fusion_dim: 48
  n_heads: 4
  dim_feedforward: 96
  dropout: 0.36
  residual_scale: 0.4
  delta_bound: 3.0
  delta_scale_start: 0.12
  delta_scale_end: 0.35
  detach_ehr_fusion_features: false
  ehr_prior: 0.6
  max_shift: 0.1
  ehr_min: 0.55
  ehr_max: 0.75
  image_token_grid_size: 2
image_branch:
  backbone: tf_efficientnet_b0.ns_jft_in1k
  pretrained: true
  image_size: 224
  hidden_dim: 128
  dropout: 0.5
ehr_branch:
  d_model: 128
  n_heads: 4
  n_layers: 2
  dim_feedforward: 320
  dropout: 0.35
  use_mask_channel: true
  use_cls_token: true
  ehr_token_dim: 48
  local_scale_init: -1.1
data:
  image_col: verified_image_path
  label_col: label
  split_col: split
  sample_col: sample_id
  require_image_exists: true
  require_image_decode_ok: true
checkpoints:
  load_ehr: false
  load_image: false
  strict: false
  ehr_path: outputs/ehr_only/models/best_by_auprc.pt
freeze:
  freeze_image_backbone: true
  freeze_image_classifier: false
  freeze_ehr_branch: false
  train_projection_layers: true
  train_fusion_layers: true
training:
  seed: 42
  epochs: 20
  batch_size: 16
  num_workers: 2
  use_amp: true
  lr_image_backbone: 0.0
  lr_image_head: 1.0e-05
  lr_ehr: 6.0e-05
  lr_fusion: 1.75e-05
  weight_decay_image: 0.001
  weight_decay_ehr: 0.0003
  weight_decay_fusion: 0.001
  warmup_epochs: 2
  min_lr_factor: 0.05
  grad_clip: 1.0
  patience: 15
sampling:
  balanced_batches: false
  pos_fraction: null
  batches_per_epoch: null
augmentation:
  hflip_p: 0.0
  affine_p: 0.15
  color_jitter_p: 0.03
loss:
  pos_weight_cap: 1.0
  fusion_bce_weight: 1.0
  image_aux_weight: 0.02
  ehr_aux_weight: 0.5
  fusion_delta_l2_weight: 0.005
  fusion_delta_mean_l2_weight: 0.005
selection:
  min_delta_auprc: 0.0001
outputs:
  model_dir: respire_transfuse
