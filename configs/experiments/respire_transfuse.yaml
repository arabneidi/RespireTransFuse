# Configure the bidirectional cross-attention RespireTransFuse experiment.
data:
  cohort_csv: data/processed/cohorts/cohort.csv
  ehr_npz: data/processed/ehr/ehr_final_24h_train_ready/ehr_24h_final_train_ready_current_split.npz
  image_root: data/raw/mimic_cxr/images
  multimodal_manifest: data/processed/multimodal/final_multimodal_manifest.csv
  ehr_features_csv: data/processed/ehr/ehr_final_24h_train_ready/ehr_24h_final_train_ready_features.csv
  image_col: verified_image_path
  label_col: label
  split_col: split
  sample_col: sample_id
  require_image_exists: true
  require_image_decode_ok: true
outputs:
  root: outputs
  model_dir: respire_transfuse
checkpoints:
  ehr_path: outputs/ehr_only/models/best_by_auprc.pt
  image_path: outputs/image_only/models/best_by_auprc.pt
  medfuse_rad_cxr_path: external/medfuse_original/checkpoints/cxr_rad_full/best_checkpoint.pth.tar
  load_ehr: false
  load_image: false
  strict: false
model:
  name: respire_transfuse
  fusion_dim: 48
  n_heads: 4
  dim_feedforward: 96
  dropout: 0.0
  residual_scale: 0.4
  detach_ehr_fusion_features: false
  image_token_grid_size: 2
image_branch:
  backbone: tf_efficientnet_b0.ns_jft_in1k
  pretrained: true
  image_size: 224
  hidden_dim: 128
  dropout: 0.5
ehr_branch:
  d_model: 128
  n_heads: 4
  n_layers: 2
  dim_feedforward: 320
  dropout: 0.35
  use_mask_channel: true
  use_cls_token: true
  ehr_token_dim: 48
  local_scale_init: -1.1
freeze:
  freeze_image_backbone: true
  freeze_image_classifier: false
  freeze_ehr_branch: false
  train_projection_layers: true
  train_fusion_layers: true
training:
  seed: 42
  epochs: 20
  batch_size: 32
  num_workers: 2
  use_amp: true
  lr_image_backbone: 0.0
  lr_image_head: 1.0e-05
  lr_ehr: 8.0e-05
  lr_fusion: 7.0e-05
  weight_decay_image: 0.001
  weight_decay_ehr: 0.00015
  weight_decay_fusion: 0.0008
  warmup_epochs: 0
  min_lr_factor: 0.05
  grad_clip: 1.0
  patience: 15
sampling:
  balanced_batches: false
  pos_fraction: null
  batches_per_epoch: null
augmentation:
  hflip_p: 0.0
  affine_p: 0.15
  color_jitter_p: 0.03
loss:
  pos_weight_cap: 1.0
  fusion_bce_weight: 1.0
  image_aux_weight: 0.02
  ehr_aux_weight: 0.5
selection:
  min_delta_auprc: 0.0001
