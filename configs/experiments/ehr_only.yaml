# Configure the EHR-only Transformer experiment.
experiment:
  name: ehr_only
  model: ehr_only
  task: binary

columns:
  sample_col: sample_id
  label_col: label
  split_col: split

model:
  d_model: 128
  n_heads: 4
  n_layers: 2
  dim_feedforward: 320
  dropout: 0.35
  use_mask_channel: true
  use_cls_token: true
  ehr_token_dim: 48
  local_scale_init: -1.1

training:
  seed: 42
  epochs: 20
  batch_size: 32
  num_workers: 2
  lr: 4.0e-5
  weight_decay: 1.0e-3
  warmup_epochs: 0
  min_lr_factor: 0.05
  grad_clip: 1.0
  use_amp: false
  patience: 10

sampling:
  balanced_batches: false
  pos_fraction: 0.35
  batches_per_epoch: null

loss:
  pos_weight_cap: 1.0
  bce_weight: 1.0
  focal_gamma: 0.0
  focal_alpha: -1.0
  ap_loss_weight: 0.0
  ap_loss_tau: 0.1
  rank_loss_weight: 0.0
  rank_loss_margin: 0.0
  rank_loss_max_pairs: 65536
  hard_rank_loss_weight: 0.0
  hard_rank_pos_k: 32
  hard_rank_neg_k: 64
  hard_rank_margin: 0.0
  logit_l2: 0.0

selection:
  monitor: val_auprc
  mode: max
  min_delta_auprc: 0.0001
  calibration_max_iter: 200

debug:
  enabled: false
  max_train_samples: null
  max_val_samples: null
  max_test_samples: null

outputs:
  root: outputs
  model_dir: ehr_only
